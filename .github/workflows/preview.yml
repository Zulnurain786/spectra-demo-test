name: spectra-preview

# Build the PR's frontend, serve it, and expose a public preview URL through a
# cloudflared quick tunnel. The reusable spectra/preview-action then publishes a
# `deployment_status(success)` with that URL, which Spectra's bot consumes to run
# its design-frontend pipeline (capture_preview -> dom-semantic-diff + visual-diff)
# against the live build, and finally waits for the `Spectra / consistency` check.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  deployments: write
  checks: read
  pull-requests: read
  statuses: write

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pin pnpm explicitly. This repo is a standalone pnpm workspace
      # (package.json + pnpm-workspace.yaml + pnpm-lock.yaml at the root); the
      # version is kept in sync with the root package.json `packageManager`.
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Spectra live preview
        uses: ./.github/actions/preview
        with:
          build-command: pnpm --filter @spectra/demo-frontend build
          serve-command: pnpm --filter @spectra/demo-frontend preview
          port: "4173"
          environment: preview
          timeout: "600"
          # Attach the deployment to the PR head commit so the bot can map the
          # deployment_status back to this pull request.
          sha: ${{ github.event.pull_request.head.sha }}
